name: Daily Chart Sweep
on:
  schedule:
    - cron: '0 10 * * *'   # daily at 10:00 UTC (~3 AM PT)
  workflow_dispatch:

permissions:
  contents: write

# Enumerates every Apple sub-genre chart into data/subgenre_feeds.csv, the seed
# list for the rolling re-check corpus (see cumulative.py). This is a PUBLIC
# repo, so Actions minutes are unlimited; runs daily for freshness.
jobs:
  subgenres:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt
      - name: Install dependencies
        run: pip install -r scraper/requirements.txt
      - name: Refresh sub-genre chart feeds
        run: python scraper/subgenres.py
      - name: Commit refreshed sub-genre feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/subgenre_feeds.csv
          if git diff --staged --quiet; then echo "No changes"; exit 0; fi
          git commit -m "Sub-genre feeds refresh: $(date -u +%Y-%m-%d)"
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then exit 0; fi
            git rebase --abort 2>/dev/null || true; sleep $((RANDOM % 15 + 5))
          done
          echo "::error::failed to push sub-genre feeds after 5 attempts"; exit 1
